# ================================================
# k8s/service.yaml
# Kubernetes Service — DevOps Capstone
# ================================================
# This tells Kubernetes HOW to expose the pods:
#   - NodePort type makes the app reachable from
#     outside the cluster (your laptop browser)
#   - Port 80 inside → NodePort 30080 outside
# ================================================

apiVersion: v1
kind: Service
metadata:
  name: capstone-service
  labels:
    app: capstone
    project: devops-capstone

spec:
  # NodePort: exposes the service on a port on each Node
  # This is what allows `minikube service capstone-service` to work
  type: NodePort

  # The Service routes traffic to Pods with this label
  selector:
    app: capstone

  ports:
    - name: http
      protocol: TCP
      port: 80          # Port the Service listens on (within cluster)
      targetPort: 80    # Port on the Pod/container to forward to
      nodePort: 30080   # External port on the Node (30000-32767 range)
